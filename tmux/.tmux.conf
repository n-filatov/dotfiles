# Disable automatic window renaming (names managed manually + by tmux-ai-status plugin)
set -g automatic-rename off

# Pi: preserve modified keys in tmux (Shift+Enter, Ctrl+Enter, etc.)
set -g extended-keys on
set -g extended-keys-format csi-u

# Pi: allow OSC-8 hyperlinks from inside tmux, so Cmd+Click works on PR links.
set -g allow-passthrough on
set -g terminal-features 'xterm*:clipboard:ccolour:cstyle:focus:title:hyperlinks,screen*:title,rxvt*:ignorefkeys,*:hyperlinks'

# Prefix key
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Start tmux window/pane numbering at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Window monitoring for parallel Claude agents
# Bell = Claude waiting for input, silence = Claude done or stuck
set-option -g visual-bell off
set-window-option -g monitor-bell on
set-window-option -g monitor-silence 15
set-option -g visual-silence off
set-option -g visual-activity off
set-window-option -g monitor-activity on

# Status bar
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'
set -g status-left ' [#{session_name}] '
set -g status-left-length 30
set -g status-right ' %H:%M %d-%b '

# Window status: status icons are handled by tmux-ai-status/Pi plugin via window_name
set -g window-status-format         ' #I:#{window_name} '
set -g window-status-current-format ' #I:#{window_name} '
set -g window-status-style          'fg=#6c7086'
set -g window-status-current-style  'fg=white bold underscore'
set -g window-status-bell-style     'fg=black bg=#f38ba8 bold'
set -g window-status-activity-style 'fg=#a6e3a1'
set -g window-status-separator      ''

# Mouse mode intercepts terminal hyperlink clicks, so keep it off by default.
# Toggle it with prefix + m when you need mouse pane resizing/scrolling.
set -g mouse off
bind-key m set-option -g mouse \; display-message "Mouse mode: #{?mouse,on,off}"

# Highlight active pane border
set -g pane-border-style        fg=colour238
set -g pane-active-border-style fg=colour39

# Split panes inheriting current path
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Slightly dim inactive panes
set -g window-style        bg=colour234
set -g window-active-style bg=colour232

# Persist tmux sessions across restarts
# Manual save:    prefix + Ctrl-s
# Manual restore: prefix + Ctrl-r
# Current prefix is Ctrl-a.
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

# Tmux Plugin Manager - keep this at the bottom of the file.
run '~/.tmux/plugins/tpm/tpm'
